<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphQL Console</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            margin: 0;
            background: #f6f7f9;
            color: #1f2933;
        }

        main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 16px;
            height: 100vh;
            padding: 16px;
        }

        section {
            display: flex;
            min-width: 0;
            min-height: 0;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: flex;
            min-height: 0;
            flex: 1;
            flex-direction: column;
            gap: 6px;
            font-weight: 600;
        }

        textarea,
        input,
        pre {
            width: 100%;
            border: 1px solid #c8d0d9;
            border-radius: 4px;
            background: #ffffff;
            color: #1f2933;
            font: 14px/1.45 Consolas, "Liberation Mono", Menlo, monospace;
        }

        textarea {
            min-height: 0;
            flex: 1;
            resize: none;
            padding: 10px;
        }

        input {
            padding: 9px 10px;
        }

        pre {
            min-height: 0;
            flex: 1;
            margin: 0;
            overflow: auto;
            padding: 10px;
            white-space: pre-wrap;
        }

        button {
            align-self: flex-start;
            border: 0;
            border-radius: 4px;
            background: #0969da;
            color: #ffffff;
            cursor: pointer;
            font-weight: 600;
            padding: 9px 14px;
        }

        button:disabled {
            background: #8aa4c1;
            cursor: progress;
        }

        .response-title {
            font-weight: 600;
        }

        @media (max-width: 800px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
            }
        }
    </style>
</head>
<body>
<main>
    <section>
        <label>
            Query
            <textarea id="query" spellcheck="false" autocomplete="off"></textarea>
        </label>
        <label>
            Variables
            <textarea id="variables" spellcheck="false" autocomplete="off"></textarea>
        </label>
        <label>
            Operation Name
            <input id="operationName" type="text" autocomplete="off">
        </label>
        <button id="execute" type="button">Execute</button>
    </section>
    <section>
        <div class="response-title">Response</div>
        <pre id="response"></pre>
    </section>
</main>
<script>
    (function () {
        'use strict';

        var queryInput = document.getElementById('query');
        var variablesInput = document.getElementById('variables');
        var operationNameInput = document.getElementById('operationName');
        var executeButton = document.getElementById('execute');
        var responseOutput = document.getElementById('response');
        var params = new URLSearchParams(window.location.search);

        queryInput.value = params.get('query') || '';
        operationNameInput.value = params.get('operationName') || '';
        variablesInput.value = formatVariables(params.get('variables'));

        queryInput.addEventListener('input', updateURL);
        variablesInput.addEventListener('input', updateURL);
        operationNameInput.addEventListener('input', updateURL);
        executeButton.addEventListener('click', executeQuery);

        function formatVariables(value) {
            if (!value) {
                return '';
            }
            try {
                return JSON.stringify(JSON.parse(value), null, 2);
            } catch (error) {
                return value;
            }
        }

        function updateURL() {
            var newParams = new URLSearchParams();
            if (queryInput.value) {
                newParams.set('query', queryInput.value);
            }
            if (variablesInput.value) {
                newParams.set('variables', variablesInput.value);
            }
            if (operationNameInput.value) {
                newParams.set('operationName', operationNameInput.value);
            }
            var queryString = newParams.toString();
            history.replaceState(null, '', queryString ? '?' + queryString : window.location.pathname);
        }

        function executeQuery() {
            var body = {
                query: queryInput.value,
                operationName: operationNameInput.value || null
            };

            if (variablesInput.value) {
                try {
                    body.variables = JSON.parse(variablesInput.value);
                } catch (error) {
                    responseOutput.textContent = 'Variables must be valid JSON.';
                    return;
                }
            }

            executeButton.disabled = true;
            responseOutput.textContent = 'Loading...';

            fetch('/graphql', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body),
                credentials: 'include'
            }).then(function (response) {
                return response.text();
            }).then(function (responseBody) {
                try {
                    responseOutput.textContent = JSON.stringify(JSON.parse(responseBody), null, 2);
                } catch (error) {
                    responseOutput.textContent = responseBody;
                }
            }).catch(function (error) {
                responseOutput.textContent = String(error);
            }).finally(function () {
                executeButton.disabled = false;
            });
        }
    }());
</script>
</body>
</html>
